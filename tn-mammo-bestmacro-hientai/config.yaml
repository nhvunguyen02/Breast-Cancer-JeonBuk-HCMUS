experiment:
  id: E1
  name: coral_ordinal_sequential
  seed: 42
data:
  train:
    tn_manifest: /mnt/hcmus/breast_vn/code/new_implement/manifests/phaseg_tn_train411.csv
    vindr_manifest: /mnt/hcmus/breast_vn/code/new_implement/manifests/phaseg_vindr_train3975.csv
  validation:
    manifest: /mnt/hcmus/breast_vn/code/new_implement/manifests/phaseg_tn_valid133.csv
  view_order:
  - L_CC
  - L_MLO
  - R_CC
  - R_MLO
  image_size: 224
  tn_domain_ratio: 0.6
model:
  backbone: densenet121
  fusion: mean
  use_ordinal_head: true
  use_binary_head: false
  imagenet_init: false
  initialization_checkpoint: /mnt/hcmus/breast_vn/code/new_implement/outputs/E0_phaseg_reproduction_seed42_20260718_163950/best_checkpoint.pt
loss:
  flat:
    name: class_balanced_focal
    gamma: 2.0
    beta: 0.99
  lambda_ordinal: 0.5
  lambda_binary: 0.0
  predeclared_lambda_ordinal_grid:
  - 0.25
  - 0.5
  - 1.0
training:
  batch_size: 2
  epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.0001
  primary_metric: macro_f1
  early_stopping_patience: 10
  num_workers: 4
  prefetch_factor: 2
  amp: true
  gradient_clip_norm: 5.0
  sampler_num_samples: 4386
  scheduler:
    name: step_lr
    step_size: 5
    gamma: 0.5
